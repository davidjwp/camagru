name: camagru

services:
  # model:
  #   container_name: model
  #   env_file: .env
  #   build:
  #     context: ./model
  #     dockerfile_inline: 
  #       FROM  mysql:latest

  #       CMD ["mysqld", "--console"]
  #   volumes:
  #     - mysql:/var/lib/mysql
  #   networks:
  #     - camagru_net

  controller:
    container_name: controller
    env_file: .env
    build:
      context: ./controller
      dockerfile_inline:
        FROM    php:8.2-apache

        ARG		SERV_PORT=${SERV_PORT} 
        EXPOSE	${SERV_PORT}
        ARG		SERV_ADDRESS=${SERV_ADDRESS}
        ARG		SERVF=${SERVF}

        RUN apt-get update && apt-get upgrade -y && apt-get install -y vim libpng-dev libjpeg-dev && docker-php-ext-configure gd --with-jpeg && docker-php-ext-install gd pdo pdo_mysql
      
    restart: always
    develop:
      watch:
        - action: sync
          path: ../view
          target: /view
        - action: sync
          path: ./controller
          target: /controller
    volumes:
      - type: bind
        source: ./controller
        target: /controller
      # - controller:/home/davidjwp/camagru
      - type: bind
        source: ./view
        target: /view
    ports:
      - "${SERV_PORT}:${SERV_PORT}"
    networks:
      - camagru_net


volumes:
  mysql:
    name: mysql
  # view:
  #   name: view
# this is temporary for work, in the final version controller copies the local file 
# into the container
  controller:
    name: controller

networks:
  camagru_net:
    driver: bridge
